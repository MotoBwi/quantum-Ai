<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rapida Widget — Docked Left</title>
  <style>
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      max-width: 800px;
      margin: 60px auto;
      padding: 0 24px;
      color: #161616;
      transition: margin 150ms cubic-bezier(0.2, 0, 0.38, 0.9);
    }
    h1 { margin-bottom: 8px; }
    p { color: #525252; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>Docked Left Layout</h1>
  <p>The chat panel is fixed to the left side of the viewport. The page content shifts right to make room.</p>

  <script>
    window.chatbotConfig = {
      assistant_id: "YOUR_ASSISTANT_ID",
      token: "YOUR_API_KEY",
      layout: "docked-left",
      theme: { mode: "light" },
    };
  </script>
  <script defer src="../../../sdks/react-widget/dist/app.min.js"></script>
</body>
</html>

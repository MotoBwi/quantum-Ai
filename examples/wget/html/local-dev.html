<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapida Widget — Local Dev</title>
    <!--
    Local development example.

    Prerequisites:
      1. cd sdks/react-widget && npm install && npm run build
      2. cd examples/react-widget/html && python3 -m http.server 8000
      3. open http://localhost:8000/local-dev.html
  -->
    <style>
      body {
        font-family: "IBM Plex Sans", sans-serif;
        max-width: 800px;
        margin: 60px auto;
        padding: 0 24px;
        color: #161616;
        transition: margin 150ms cubic-bezier(0.2, 0, 0.38, 0.9);
      }
      h1 {
        margin-bottom: 8px;
      }
      p {
        color: #525252;
        line-height: 1.6;
      }
      code {
        background: #f4f4f4;
        padding: 2px 6px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Rapida Widget — Local Dev</h1>
    <p>
      Chat widget loads from local build. Open browser console for debug logs.
    </p>
    <p>
      Edit <code>window.chatbotConfig</code> below to change layout, theme, or
      credentials.
    </p>

    <script>
      window.chatbotConfig = {
        // api_base: "http://localhost:8080",
        assistant_id: "2289465470006329344",
        token:
          "bca387c4e5cb8fd4cbcaeb194389216959c14dcaee4069d76c52093f5f571171",
        // assistant_id: "2139456643765633024",
        // token:
        //   "5e04b962dfd988ca0f4ac9e097f17841ebf34d7e38c50297e245c12bddce2117",
        user: {
          id: "demo-user",
          name: "Guest",
        },

        // ---- Usage 1: Floating (default) ----
        // A floating panel with a launcher FAB button.
        layout: "docked-right",
        position: "bottom-right", // bottom-right | bottom-left | top-right | top-left
        showLauncher: true, // set false to use your own trigger button

        // ---- Usage 2: Docked to side ----
        // Panel sticks to the side of the viewport and pushes page content.
        // layout: "docked-right",   // docked-right | docked-left

        // ---- Usage 3: Inline ----
        // Panel flows with page content, no fixed positioning.
        // layout: "inline",

        name: "Rapida Assistant",
        logo_url:
          "https://rapida-assets-01.s3.ap-south-1.amazonaws.com/cdn/rapidaLogo.png",
        theme: {
          mode: "light", // light | dark
        },
      };
    </script>
    <script
      defer
      src="https://cdn-01.rapida.ai/public/scripts/v1.0.0/app.min.js"
    ></script>
  </body>
</html>
